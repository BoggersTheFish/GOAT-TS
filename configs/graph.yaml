graph:
  backend: nebula
  dry_run: true
  # Optional: persist in-memory store to SQLite when dry_run (e.g. data/goat_graph.db)
  # sqlite_path: data/goat_graph.db
  embedding_model: all-MiniLM-L6-v2
  max_edges_per_node: 8
  similarity_threshold: 0.3
  host: 127.0.0.1
  port: 9669
  username: root
  password: nebula
  space: ts_graph
  vid_type: FIXED_STRING(64)
  timeout_ms: 30000
  batch_size: 1000
