# Stage 3: Set use_gpu: true when CUDA/FAISS-GPU available; requires faiss-gpu and PyTorch CUDA.
# Env override: GOAT_USE_GPU=1
simulation:
  use_gpu: false
  gravitational_constant: 0.1
  damping: 0.02
  repulsion: 0.05
  spring_constant: 0.25
  ideal_length_base: 1.0
  velocity_damping: 0.96
  position_bound: 10.0
  phi: 0.98
  kappa: 0.25
  lambda: 0.15
  max_mass: 1000.0
  split_threshold: 500.0
  epsilon: 1.0e-6
